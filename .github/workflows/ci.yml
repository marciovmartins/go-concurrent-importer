
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: [ self-hosted ]
    services:
      docker:
        image: docker:24.0.7-dind
        options: --privileged
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Start services with Docker Compose
        run: |
          docker compose up -d

      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.24.11'
          cache: true

      - name: Install dependencies
        working-directory: ./app
        run: go mod tidy

      - name: Run tests
        working-directory: ./app/internal/service
        run: go test -v -race

